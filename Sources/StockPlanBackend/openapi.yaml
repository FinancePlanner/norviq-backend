  /brokers/import/csv:
    post:
      operationId: importBrokersCsvPreview
      tags: [Brokers]
      summary: Upload a CSV and preview parsed rows
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CsvImportPreviewResponse'
