  /v1/market/chart-builder/{symbol}:
    parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getChartBuilder
      tags: [MarketData]
      summary: Build aligned metric time series for a symbol
      description: Returns aligned time series for the selected metrics of a symbol (max 20 metrics), optionally with up to 3 compare symbols matched by fiscal year. `period=ttm` assembles rolling four-quarter series (flow metrics summed, balance-sheet items point-in-time, supported margins recomputed from TTM components) and rejects metrics whose catalog entry has `supportsTTM=false`. Growth statistics (YOY, total change, CAGR) are computed per series. Requires the market fundamentals premium feature; FMP free-tier symbol restrictions apply to the primary and every compare symbol.
      security:
        - bearerAuth: []
      parameters:
        - name: metrics
          in: query
          required: true
          description: Comma-separated metric keys from the chart-builder catalog, e.g. `revenue,freeCashFlow,netProfitMargin`.
          schema:
            type: string
        - name: period
          in: query
          required: false
          description: One of `annual` (default), `quarter`, or `ttm`.
          schema:
            type: string
            enum: [annual, quarter, ttm]
        - name: limit
          in: query
          required: false
          description: Number of periods to return (default 10 annual / 20 quarter and TTM, max 40).
          schema:
            type: integer
            format: int32
        - name: compare
          in: query
          required: false
          description: Comma-separated peer symbols (max 3), aligned to the primary symbol's fiscal years.
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartBuilderResponse'
        '400':
          description: Unknown metric keys, invalid period, metric not supported for TTM, or caps exceeded
        '401':
          description: Unauthorized
        '402':
          description: Premium or paid FMP plan required for this symbol
        '502':
          description: Bad Gateway for FMP provider
        '503':
          description: FMP provider unavailable or misconfigured
  /v1/market/chart-builder/{symbol}/csv:
    parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getChartBuilderCSV
      tags: [MarketData]
      summary: Download chart-builder series as CSV
      description: Same parameters and semantics as `getChartBuilder`, but streams the aligned series as a UTF-8 BOM-prefixed CSV attachment (rows = periods oldest to newest, one column per symbol/metric pair).
      security:
        - bearerAuth: []
