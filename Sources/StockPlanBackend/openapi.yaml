openapi: 3.0.3
info:
  title: StockPlanBackend
  description: |
    Stock planner backend.
    Finnhub-backed market data is configured on the backend with `FINNHUB_API_KEY`, `FINNHUB_WEBHOOK_URL`, and `FINNHUB_WEBHOOK_SECRET`.
    FMP-backed cash-flow, balance-sheet, ratios, growth, consensus, and sector-performance endpoints are configured on the backend with `FMP_API_KEY`.
    All direct Finnhub GET requests require either `token=<apiKey>` in the URL or `X-Finnhub-Token: <apiKey>` as a header. You can find the API key in the Finnhub Dashboard.
    All direct FMP GET requests require `apikey=<apiKey>` in the URL query string. In Bruno, set `FMP_API_KEY`.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local (docker-compose)
  - url: /
    description: Relative base URL
tags:
  - name: Health
  - name: Auth
  - name: Stocks
  - name: Watchlist
  - name: Research
  - name: Targets
  - name: MarketData
  - name: Finnhub
    description: Direct Finnhub reference endpoints used by the backend market-data provider and Bruno collection examples. Backend Finnhub configuration uses `FINNHUB_API_KEY`, `FINNHUB_WEBHOOK_URL`, and `FINNHUB_WEBHOOK_SECRET`.
  - name: FMP
    description: Direct FMP reference endpoints and backend-backed FMP flows. Backend FMP configuration uses `FMP_API_KEY`.
  - name: Webhooks
    description: Public inbound webhook endpoints for provider event delivery.
  - name: Portfolio
  - name: Rebalancing
    description: Rule-based allocation policies, drift monitoring, simulations, and planning records. These endpoints never submit broker orders.
  - name: Retirement
  - name: AdvancedReporting
  - name: Scenarios
  - name: Brokers
  - name: Statistics
  - name: News
  - name: Crypto
  - name: Dashboard
  - name: AI
  - name: UserProfile
  - name: Badges
  - name: Feedback
  - name: Assets
  - name: Notifications
  - name: Tax
  - name: Billing
  - name: Export
  - name: Macro
    description: >-
      Global macro / inflation data (Nowflation parity). Country-aware via
      `?country=US|BR|PT|EA` (defaults to US). Sources — US uses FRED
      (`FRED_API_KEY`) plus optional Nowflation enrichment
      (`NOWFLATION_BASE_URL`/`NOWFLATION_SNAPSHOT_PATH`); PT/EA use Eurostat
      HICP; BR uses IBGE SIDRA. Responses fall back to stub data marked
      `source="stub"` while `MACRO_ALLOW_STUB_FALLBACK=true`.
paths:
  /v1/financing/simulations:
    post:
      operationId: simulateFinancing
      summary: Simulate one or more financing offers
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinancingSimulationRequest' }
      responses:
        '200':
          description: Financing comparison and affordability assessment
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinancingSimulationResponse' }
  /v1/financing/plans:
    get:
      operationId: listFinancingPlans
      summary: List saved financing plans
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Saved plans
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/FinancingPlanResponse' } }
    post:
      operationId: createFinancingPlan
      summary: Save a financing plan
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinancingPlanRequest' }
      responses:
        '201':
          description: Saved financing plan
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FinancingPlanResponse' }
  /v1/financing/projections:
    get:
      operationId: listFinancingProjections
      summary: List projected installments in a date range
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Projected installments
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/FinancingProjectionResponse' } }
  /health:
    get:
      operationId: health
      tags: [Health]
      summary: Application health check
      responses:
        '200':
          description: Application is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1:
    get:
      operationId: root
      tags: [Health]
      summary: API root
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /v1/hello:
    get:
      operationId: hello
      tags: [Health]
      summary: Hello world
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /v1/auth/register:
    post:
      operationId: authRegister
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /v1/auth/login:
    post:
      operationId: authLogin
      tags: [Auth]
      summary: Login and receive either MFA challenge or tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - $ref: '#/components/schemas/AuthLoginOutcome'
  /v1/auth/forgot-password:
    post:
      operationId: authForgotPassword
      tags: [Auth]
      summary: Issue a password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
  /v1/auth/resend-reset:
    post:
      operationId: authResendReset
      tags: [Auth]
      summary: Resend a password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
  /v1/auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [Auth]
      summary: Reset password using a reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResetPasswordRequest'
      responses:
        '204':
          description: No Content
  /v1/auth/refresh:
    post:
      operationId: authRefresh
      tags: [Auth]
      summary: Refresh tokens using a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /v1/auth/mfa/verify:
    post:
      operationId: authMFAVerify
      tags: [Auth]
      summary: Verify MFA challenge and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthMFAVerifyRequest'
      responses:
        '200':
          description: MFA verification successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired challenge/code
        '429':
          description: Too many attempts
  /v1/auth/mfa/resend:
    post:
      operationId: authMFAResend
      tags: [Auth]
      summary: Resend MFA verification code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthMFAResendRequest'
      responses:
        '200':
          description: MFA challenge refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMFAChallengeResponse'
        '401':
          description: Invalid or expired challenge
        '429':
          description: Resend limit exceeded
  /v1/auth/oauth/{provider}/start:
    post:
      operationId: authOAuthStart
      tags: [Auth]
      summary: Start OAuth authorization flow
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthStartRequest'
      responses:
        '200':
          description: OAuth flow initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        '400':
          description: Invalid provider or redirect URI
        '503':
          description: OAuth provider is not configured on the backend
  /v1/auth/oauth/{provider}/exchange:
    post:
      operationId: authOAuthExchange
      tags: [Auth]
      summary: Exchange OAuth authorization code and receive either MFA challenge or tokens
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthExchangeRequest'
      responses:
        '200':
          description: OAuth exchange successful
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/AuthResponse'
                  - $ref: '#/components/schemas/AuthLoginOutcome'
        '401':
          description: OAuth flow invalid/expired or provider verification failed
        '409':
          description: Account with this email already exists and requires linking
  /v1/auth/oauth/identities:
    get:
      operationId: authOAuthIdentities
      tags: [Auth]
      summary: List connected OAuth sign-in accounts for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Connected sign-in account status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthLinkedAccountsResponse'
        '401':
          description: Missing or invalid authentication token
  /v1/auth/oauth/{provider}/link/start:
    post:
      operationId: authOAuthLinkStart
      tags: [Auth]
      summary: Start an authenticated OAuth account-linking flow
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthStartRequest'
      responses:
        '200':
          description: OAuth link flow initialized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        '400':
          description: Invalid provider or redirect URI
        '401':
          description: Missing or invalid authentication token
        '503':
          description: OAuth provider is not configured on the backend
  /v1/auth/oauth/{provider}/link/exchange:
    post:
      operationId: authOAuthLinkExchange
      tags: [Auth]
      summary: Exchange OAuth authorization code and link the provider to the authenticated account
      security:
        - bearerAuth: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/OAuthProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthExchangeRequest'
      responses:
        '200':
          description: OAuth provider linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthLinkResponse'
        '401':
          description: OAuth flow invalid/expired or missing authentication token
        '409':
          description: Provider email could not be verified for this account or provider is already linked
  /v1/auth/webauthn/login/options:
    post:
      operationId: authWebAuthnLoginOptions
      tags: [Auth]
      summary: Begin WebAuthn passkey login
      responses:
        '200':
          description: Public key credential request options
          content:
            application/json:
              schema:
                type: object
                required: [publicKey]
                properties:
                  publicKey:
                    type: object
                    description: WebAuthn PublicKeyCredentialRequestOptions
        '400':
          description: Missing or disallowed Origin header
        '503':
          description: WebAuthn is not configured on the backend
  /v1/auth/webauthn/login/verify:
    post:
      operationId: authWebAuthnLoginVerify
      tags: [Auth]
      summary: Verify WebAuthn passkey assertion and issue tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn AuthenticationCredential (PublicKeyCredential)
      responses:
        '200':
          description: Passkey login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unknown passkey or invalid challenge
        '503':
          description: WebAuthn is not configured on the backend
  /v1/auth/me:
    get:
      operationId: authMe
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Unauthorized

  /v1/users:
    get:
      operationId: getUserProfile
      tags: [UserProfile]
      summary: Get the authenticated user profile
      description: Returns the profile for the user identified by the bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProfileResponse'
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
    put:
      operationId: updateUserProfile
      tags: [UserProfile]
      summary: Update the authenticated user profile
      description: Updates the authenticated user's profile fields. The `userProfile.id` value must match the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Invalid payload. Returned when the profile ID does not match the authenticated user, the email is invalid, or the username fails validation.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '409':
          description: The requested email or username is already registered to another user.
    delete:
      operationId: deleteUserProfile
      tags: [UserProfile]
      summary: Delete the authenticated user account
      description: Permanently deletes the authenticated user account identified by the bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Confirmation that the authenticated user account was deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserProfileResponse'
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.

  /v1/users/{id}:
    get:
      operationId: getUserProfileByID
      tags: [UserProfile]
      summary: Get a user profile by id
      description: Returns the authenticated user's profile when the path id matches the bearer token user id. This route is reserved for future role-based access expansion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProfileResponse'
        '400':
          description: Invalid user id.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '403':
          description: The authenticated user is not allowed to access another user's profile.
    put:
      operationId: updateUserProfileByID
      tags: [UserProfile]
      summary: Update a user profile by id
      description: Updates the authenticated user's profile when the path id matches the bearer token user id. The `userProfile.id` value must also match that same user id.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Invalid user id, invalid payload, or a profile id mismatch.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '403':
          description: The authenticated user is not allowed to update another user's profile.
        '409':
          description: The requested email or username is already registered to another user.
    delete:
      operationId: deleteUserProfileByID
      tags: [UserProfile]
      summary: Delete a user account by id
      description: Deletes the authenticated user's account when the path id matches the bearer token user id. This route is reserved for future role-based access expansion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Confirmation that the requested user account was deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserProfileResponse'
        '400':
          description: Invalid user id.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '403':
          description: The authenticated user is not allowed to delete another user's profile.

  /v1/users/username:
    patch:
      operationId: updateUsername
      tags: [UserProfile]
      summary: Update the authenticated user's username
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUsernameRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Invalid username.
        '401':
          description: Unauthorized
        '409':
          description: Username already taken.

  /v1/users/email:
    patch:
      operationId: updateEmail
      tags: [UserProfile]
      summary: Update the authenticated user's email
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmailRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Invalid email.
        '401':
          description: Unauthorized
        '409':
          description: Email already registered.

  /v1/users/password:
    patch:
      operationId: updatePassword
      tags: [UserProfile]
      summary: Update the authenticated user's password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
      responses:
        '200':
          description: Password updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIMessageResponse'
        '400':
          description: Invalid password payload.
        '401':
          description: Unauthorized or current password incorrect.

  /v1/badges:
    get:
      operationId: listBadges
      tags: [Badges]
      summary: List badge progress for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Badge progress list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadgesListResponse'
        '401':
          description: Unauthorized

  /v1/feedback:
    post:
      operationId: submitFeedback
      tags: [Feedback]
      summary: Submit product feedback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
      responses:
        '200':
          description: Feedback accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
        '400':
          description: Invalid feedback payload.
        '401':
          description: Unauthorized

  /v1/stocks:
    get:
      operationId: listStocks
      tags: [Stocks]
      summary: List stocks
      security:
        - bearerAuth: []
      parameters:
        - name: portfolioListId
          in: query
          required: false
          description: Optional portfolio list identifier. If omitted, returns holdings in the default portfolio list.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockListItem'
        '401':
          description: Unauthorized
    post:
      operationId: createStock
      tags: [Stocks]
      summary: Create a stock holding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
        '401':
          description: Unauthorized
  /v1/stocks/{symbol}/insights:
    parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getStockInsights
      tags: [Stocks]
      summary: Get aggregate stock insights
      description: Returns a deterministic aggregate of profile metrics, peer candidates, and projection scenarios for the requested symbol.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockInsightsResponse'
        '400':
          description: Invalid symbol
        '401':
          description: Unauthorized
  /v1/stocks/symbol/{symbol}/valuation:
    parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getStockValuation
      tags: [Stocks]
      summary: Get the bear, base, and bull valuation ranges for a stock by symbol
      description: Returns the saved valuation for the authenticated user's stock with this symbol. Responds with 404 if the authenticated user does not own the stock or has not saved valuation data yet.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValuationRequest'
        '404':
          description: Stock or valuation not found
        '401':
          description: Unauthorized
    post:
      operationId: createStockValuation
      tags: [Stocks]
      summary: Create valuation ranges for a stock by symbol
      description: Creates a bear/base/bull valuation for the authenticated user's stock with this symbol. The stock must already exist in the authenticated user's portfolio.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockValuationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValuationRequest'
        '400':
          description: Invalid symbol, targetDate, or price range
        '404':
          description: Stock not found
        '409':
          description: Valuation already exists
        '401':
          description: Unauthorized
    put:
      operationId: updateStockValuation
      tags: [Stocks]
      summary: Update valuation ranges for a stock by symbol
      description: Updates the saved valuation for the authenticated user's stock with this symbol. Returns 404 if the authenticated user does not own the stock or has not created valuation data yet.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockValuationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValuationRequest'
        '400':
          description: Invalid symbol, targetDate, or price range
        '404':
          description: Stock or valuation not found
        '401':
          description: Unauthorized
  /v1/stocks/bulk:
    post:
      operationId: bulkCreateStocks
