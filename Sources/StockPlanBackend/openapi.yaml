components:
  parameters:
    ScenarioResourceID:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    MacroCountryParam:
      name: country
      in: query
      required: false
      schema:
        type: string
        enum: [US, BR, PT, EA]
        default: US
      description: Country code (case-insensitive; `EURO`/`EZ` accepted as aliases for `EA`). Unknown values fall back to US.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    finnhubQueryToken:
      type: apiKey
      in: query
      name: token
      description: Finnhub API key from the Finnhub Dashboard passed as the `token` query parameter. In Bruno, set `FINNHUB_API_KEY`.
    finnhubHeaderToken:
      type: apiKey
      in: header
      name: X-Finnhub-Token
      description: Finnhub API key from the Finnhub Dashboard passed as the `X-Finnhub-Token` header. In Bruno, set `FINNHUB_API_KEY`.
    fmpQueryApiKey:
      type: apiKey
      in: query
      name: apikey
      description: FMP API key passed as the `apikey` query parameter. In Bruno, set `FMP_API_KEY`.
    finnhubWebhookSecretHeader:
      type: apiKey
      in: header
      name: X-Finnhub-Secret
      description: Shared secret for inbound Finnhub webhook delivery. Configure the backend with `FINNHUB_WEBHOOK_SECRET`.
    finnhubWebhookSecretQuery:
      type: apiKey
      in: query
      name: secret
      description: Shared secret for inbound Finnhub webhook delivery when the provider can only append query parameters. Configure the backend with `FINNHUB_WEBHOOK_SECRET`.
    revenueCatWebhookSecret:
      type: apiKey
      in: header
      name: Authorization
      description: Shared secret for inbound RevenueCat webhook delivery. Configure the backend with `REVENUECAT_WEBHOOK_SECRET`.
  schemas:
    RebalancingDocument:
      type: object
      description: Rebalancing contract defined in the versioned StockPlanShared package.
      additionalProperties: true
    ScenarioJSON:
      type: object
      additionalProperties: true
      description: >
        Opaque scenario payload. Completed run results may include timeline, maximum_drawdown,
        ending_value, portfolio_change_percent, goal_delay_months, required_monthly_contribution,
        contribution_delta, recovery_months, expense_impact_monthly, goal_probability,
        expected_shortfall, holding_contributions, class_contributions, assumptions, and warnings.
    FinancialGoalInput:
      type: object
      required: [name, goalType, targetAmount, targetDate, baseCurrency, startingCapital, monthlyContribution, annualContributionGrowth, inflationAssumption, riskProfile, status, portfolioAllocations, expenseCategoryLinks]
      properties:
        name: { type: string, minLength: 1 }
        goalType: { type: string, enum: [retirement, home_purchase, financial_independence, education, emergency_fund, investment_target, custom] }
        targetAmount: { type: number, format: double, minimum: 0, exclusiveMinimum: true }
        targetDate: { type: string, format: date }
        baseCurrency: { type: string, minLength: 3, maxLength: 3 }
        startingCapital: { type: number, format: double, minimum: 0 }
        monthlyContribution: { type: number, format: double, minimum: 0 }
        annualContributionGrowth: { type: number, format: double }
        inflationAssumption: { type: number, format: double }
        riskProfile: { type: string, enum: [conservative, moderate, aggressive] }
        expectedAnnualReturn: { type: number, format: double, nullable: true }
        status: { type: string, enum: [active, paused, completed, archived] }
        portfolioAllocations: { type: array, items: { $ref: '#/components/schemas/GoalPortfolioAllocation' } }
        expenseCategoryLinks: { type: array, items: { $ref: '#/components/schemas/GoalExpenseCategoryLink' } }
    FinancialGoal:
      allOf:
        - $ref: '#/components/schemas/FinancialGoalInput'
        - type: object
          required: [id, portfolioListId, expectedAnnualReturn]
          properties:
            id: { type: string, format: uuid }
            portfolioListId: { type: string, format: uuid, description: Legacy primary portfolio retained for scenario compatibility. }
            expectedAnnualReturn: { type: number, format: double }
            createdAt: { type: string, nullable: true }
            updatedAt: { type: string, nullable: true }
    GoalPortfolioAllocation:
      type: object
      required: [id, portfolioListId, allocationPercentage]
      properties:
        id: { type: string, format: uuid }
        portfolioListId: { type: string, format: uuid }
        allocationPercentage: { type: number, format: double, minimum: 0, maximum: 100 }
    GoalExpenseCategoryLink:
      type: object
      required: [id, categoryId, role]
      properties:
        id: { type: string, format: uuid }
        categoryId: { type: string, format: uuid }
        role: { type: string, enum: [observed_contribution, reduction_candidate] }
    GoalTrajectoryPoint:
      type: object
      required: [date, plannedValue, projectedValue]
      properties:
        date: { type: string, format: date }
        plannedValue: { type: number, format: double }
        actualValue: { type: number, format: double, nullable: true }
        projectedValue: { type: number, format: double }
    GoalProgress:
      type: object
      required: [goalId, currency, currentValue, targetAmount, percentComplete, plannedValueToday, projectedValueAtTarget, driftAmount, driftState, plannedMonthlyContribution, observedMonthlyContribution, trajectory, warnings, calculatedAt]
      properties:
        goalId: { type: string, format: uuid }
        currency: { type: string }
        currentValue: { type: number, format: double }
        targetAmount: { type: number, format: double }
        percentComplete: { type: number, format: double }
        plannedValueToday: { type: number, format: double }
        projectedValueAtTarget: { type: number, format: double }
        projectedCompletionDate: { type: string, format: date, nullable: true }
        driftAmount: { type: number, format: double }
        driftMonths: { type: integer, nullable: true }
        driftState: { type: string, enum: [ahead, on_track, behind, complete, insufficient_data] }
        plannedMonthlyContribution: { type: number, format: double }
        observedMonthlyContribution: { type: number, format: double }
        trajectory: { type: array, items: { $ref: '#/components/schemas/GoalTrajectoryPoint' } }
        warnings: { type: array, items: { type: string } }
        calculatedAt: { type: string, format: date-time }
    GoalOverviewItem:
      type: object
      required: [id, goal, progress]
      properties:
        id: { type: string, format: uuid }
        goal: { $ref: '#/components/schemas/FinancialGoal' }
        progress: { $ref: '#/components/schemas/GoalProgress' }
    GoalOverview:
      type: object
      required: [items, totalCurrentValue, totalTargetAmount, activeGoalCount, isPro]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/GoalOverviewItem' } }
        totalCurrentValue: { type: number, format: double }
        totalTargetAmount: { type: number, format: double }
        activeGoalCount: { type: integer }
        activeGoalLimit: { type: integer, nullable: true }
        isPro: { type: boolean }
    GoalTemplate:
      type: object
      required: [id, name, goalType, suggestedYears, riskProfile]
      properties:
        id: { type: string }
        name: { type: string }
        goalType: { type: string }
        suggestedYears: { type: integer }
        riskProfile: { type: string }
    GoalWhatIfRequest:
      type: object
      properties:
        monthlyContribution: { type: number, format: double, minimum: 0, nullable: true }
        expectedAnnualReturn: { type: number, format: double, nullable: true }
        targetDate: { type: string, format: date, nullable: true }
    GoalWhatIfResponse:
      type: object
      required: [baseline, scenario]
      properties:
        baseline: { $ref: '#/components/schemas/GoalProgress' }
        scenario: { $ref: '#/components/schemas/GoalProgress' }
    GoalContributionInput:
      type: object
      required: [amount, occurredAt]
      properties:
        amount: { type: number, format: double, minimum: 0, exclusiveMinimum: true }
        occurredAt: { type: string, format: date }
        note: { type: string, nullable: true }
    GoalContribution:
      allOf:
        - $ref: '#/components/schemas/GoalContributionInput'
        - type: object
          required: [id, goalId, createdAt]
          properties:
            id: { type: string, format: uuid }
            goalId: { type: string, format: uuid }
            createdAt: { type: string, format: date-time }
    GoalSuggestion:
      type: object
      required: [id, goalId, kind, title, explanation, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        goalId: { type: string, format: uuid }
        kind: { type: string, enum: [increase_contribution, reduce_contribution, reduce_spending, extend_target_date, rebalance_allocation] }
        title: { type: string }
        explanation: { type: string }
        monthlyAmount: { type: number, format: double, nullable: true }
        allocationPercentage: { type: number, format: double, nullable: true }
        estimatedMonthsChanged: { type: integer, nullable: true }
        status: { type: string, enum: [proposed, accepted, dismissed] }
        createdAt: { type: string, format: date-time }
    GoalAdjustmentDraft:
      type: object
      required: [id, suggestionId, destination, payload, createdAt]
      properties:
        id: { type: string, format: uuid }
        suggestionId: { type: string, format: uuid }
        destination: { type: string, enum: [budget, rebalancing, goal] }
        payload: { type: object, additionalProperties: { type: string } }
        createdAt: { type: string, format: date-time }
    FinancialGoalBulkUpdate:
      type: object
      required: [goalIds, status]
      properties:
        goalIds: { type: array, minItems: 1, items: { type: string, format: uuid } }
        status: { type: string, enum: [active, paused, completed, archived] }
    ScenarioInput:
      type: object
      required: [portfolioListId, name, kind, configuration]
      properties:
        portfolioListId: { type: string, format: uuid }
        financialGoalId: { type: string, format: uuid, nullable: true }
        name: { type: string, minLength: 1 }
        kind: { type: string, enum: [historical, custom, monte_carlo] }
        configuration: { $ref: '#/components/schemas/ScenarioJSON' }
        isSaved: { type: boolean, default: true }
    ScenarioDefinition:
      allOf:
        - $ref: '#/components/schemas/ScenarioInput'
        - type: object
          required: [id, userId]
          properties:
            id: { type: string, format: uuid }
            userId: { type: string, format: uuid }
            createdAt: { type: string, format: date-time, nullable: true }
            updatedAt: { type: string, format: date-time, nullable: true }
    ScenarioSnapshotInput:
      type: object
      required: [portfolioListId, baseCurrency]
      properties:
        portfolioListId: { type: string, format: uuid }
        baseCurrency: { type: string, minLength: 3, maxLength: 3 }
        cryptoHoldingIds:
          type: array
          description: Explicitly selected owned crypto holdings to freeze into the snapshot.
          items: { type: string, format: uuid }
    ScenarioSnapshot:
      allOf:
        - $ref: '#/components/schemas/ScenarioSnapshotInput'
        - type: object
          required: [id, userId, valuationTimestamp, payload, warnings]
          properties:
            id: { type: string, format: uuid }
            userId: { type: string, format: uuid }
            valuationTimestamp: { type: string, format: date-time }
            payload: { $ref: '#/components/schemas/ScenarioJSON' }
            warnings: { $ref: '#/components/schemas/ScenarioJSON' }
            createdAt: { type: string, format: date-time, nullable: true }
    ScenarioRunInput:
      type: object
      required: [snapshotId]
      properties:
        snapshotId: { type: string, format: uuid }
        seed: { type: integer, format: int64, minimum: 0, nullable: true }
    ScenarioRun:
      type: object
      required: [id, userId, scenario, snapshot, state, progress, seed, deduplicationHash, engineVersion, catalogVersion]
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        scenario: { type: object, additionalProperties: true }
        snapshot: { type: object, additionalProperties: true }
        state: { type: string, enum: [queued, running, completed, failed, cancelled] }
        progress: { type: number, format: double, minimum: 0, maximum: 1 }
        seed: { type: string }
        deduplicationHash: { type: string }
        engineVersion: { type: string }
        catalogVersion: { type: string }
        result: { $ref: '#/components/schemas/ScenarioJSON', nullable: true }
        errorMessage: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        completedAt: { type: string, format: date-time, nullable: true }
    ScenarioCatalogItem:
      type: object
      required: [id, name, startDate, endDate]
