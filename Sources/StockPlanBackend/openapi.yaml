components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthRegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    AuthLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        userId:
          type: string
          format: uuid
        expiresIn:
          type: integer
          format: int32
        refreshToken:
          type: string
        refreshExpiresIn:
          type: integer
          format: int32
      required: [token, userId, expiresIn, refreshToken, refreshExpiresIn]
    AuthUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
      required: [id, email]
    AuthForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    AuthForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
        resetCode:
          type: string
      required: [message]
    AuthResetPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        code:
          type: string
        newPassword:
          type: string
      required: [email, code, newPassword]
    AuthRefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required: [refreshToken]

    StockRequest:
      type: object
      properties:
        symbol:
          type: string
        shares:
          type: number
          format: double
        buyPrice:
          type: number
          format: double
        buyDate:
          type: string
          format: date
        notes:
          type: string
      required: [symbol, shares, buyPrice, buyDate]
    StockResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        shares:
          type: number
          format: double
        buyPrice:
          type: number
          format: double
        buyDate:
          type: string
          format: date
        notes:
          type: string
      required: [id, symbol, shares, buyPrice, buyDate]

    WatchlistItemRequest:
