        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getStock
      tags: [Stocks]
      summary: Get a stock holding by id
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    put:
      operationId: updateStock
      tags: [Stocks]
      summary: Update a stock holding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    delete:
      operationId: deleteStock
      tags: [Stocks]
      summary: Delete a stock holding
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '401':
          description: Unauthorized

