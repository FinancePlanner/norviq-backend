openapi: 3.0.3
info:
  title: StockPlanBackend
  description: |
    Stock planner backend.
    Finnhub-backed market data is configured on the backend with `FINNHUB_API_KEY`, `FINNHUB_WEBHOOK_URL`, and `FINNHUB_WEBHOOK_SECRET`.
    FMP-backed cash-flow, balance-sheet, ratios, growth, consensus, and sector-performance endpoints are configured on the backend with `FMP_API_KEY`.
    All direct Finnhub GET requests require either `token=<apiKey>` in the URL or `X-Finnhub-Token: <apiKey>` as a header. You can find the API key in the Finnhub Dashboard.
    All direct FMP GET requests require `apikey=<apiKey>` in the URL query string. In Bruno, set `FMP_API_KEY`.
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local (docker-compose)
  - url: /
    description: Relative base URL
tags:
  - name: Health
  - name: Auth
  - name: Stocks
  - name: Watchlist
  - name: Research
  - name: Targets
  - name: MarketData
  - name: Finnhub
    description: Direct Finnhub reference endpoints used by the backend market-data provider and Bruno collection examples. Backend Finnhub configuration uses `FINNHUB_API_KEY`, `FINNHUB_WEBHOOK_URL`, and `FINNHUB_WEBHOOK_SECRET`.
  - name: FMP
    description: Direct FMP reference endpoints and backend-backed FMP flows. Backend FMP configuration uses `FMP_API_KEY`.
  - name: Webhooks
    description: Public inbound webhook endpoints for provider event delivery.
  - name: Portfolio
  - name: Brokers
  - name: Statistics
  - name: News
  - name: Dashboard
  - name: UserProfile
paths:
  /health:
    get:
      operationId: health
      tags: [Health]
      summary: Application health check
      responses:
        '200':
          description: Application is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v1:
    get:
      operationId: root
      tags: [Health]
      summary: API root
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /v1/hello:
    get:
      operationId: hello
      tags: [Health]
      summary: Hello world
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /v1/auth/register:
    post:
      operationId: authRegister
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /v1/auth/login:
    post:
      operationId: authLogin
      tags: [Auth]
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /v1/auth/forgot-password:
    post:
      operationId: authForgotPassword
      tags: [Auth]
      summary: Issue a password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
  /v1/auth/resend-reset:
    post:
      operationId: authResendReset
      tags: [Auth]
      summary: Resend a password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
  /v1/auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [Auth]
      summary: Reset password using a reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResetPasswordRequest'
      responses:
        '204':
          description: No Content
  /v1/auth/refresh:
    post:
      operationId: authRefresh
      tags: [Auth]
      summary: Refresh tokens using a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /v1/auth/me:
    get:
      operationId: authMe
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Unauthorized

  /v1/users:
    get:
      operationId: getUserProfile
      tags: [UserProfile]
      summary: Get the authenticated user profile
      description: Returns the profile for the user identified by the bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProfileResponse'
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
    put:
      operationId: updateUserProfile
      tags: [UserProfile]
      summary: Update the authenticated user profile
      description: Updates the authenticated user's profile fields. The `userProfile.id` value must match the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Invalid payload. Returned when the profile ID does not match the authenticated user, the email is invalid, or the username fails validation.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '409':
          description: The requested email or username is already registered to another user.
    delete:
      operationId: deleteUserProfile
      tags: [UserProfile]
      summary: Delete the authenticated user account
      description: Permanently deletes the authenticated user account identified by the bearer token.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Confirmation that the authenticated user account was deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserProfileResponse'
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.

  /v1/users/{id}:
    get:
      operationId: getUserProfileByID
      tags: [UserProfile]
      summary: Get a user profile by id
      description: Returns the authenticated user's profile when the path id matches the bearer token user id. This route is reserved for future role-based access expansion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The requested user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUserProfileResponse'
        '400':
          description: Invalid user id.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '403':
          description: The authenticated user is not allowed to access another user's profile.
    put:
      operationId: updateUserProfileByID
      tags: [UserProfile]
      summary: Update a user profile by id
      description: Updates the authenticated user's profile when the path id matches the bearer token user id. The `userProfile.id` value must also match that same user id.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserProfileRequest'
      responses:
        '200':
          description: The updated user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateUserProfileResponse'
        '400':
          description: Invalid user id, invalid payload, or a profile id mismatch.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '403':
          description: The authenticated user is not allowed to update another user's profile.
        '409':
          description: The requested email or username is already registered to another user.
    delete:
      operationId: deleteUserProfileByID
      tags: [UserProfile]
      summary: Delete a user account by id
      description: Deletes the authenticated user's account when the path id matches the bearer token user id. This route is reserved for future role-based access expansion.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: User identifier.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Confirmation that the requested user account was deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteUserProfileResponse'
        '400':
          description: Invalid user id.
        '401':
          description: Missing or invalid bearer token, or the authenticated user could not be resolved.
        '403':
          description: The authenticated user is not allowed to delete another user's profile.

  /v1/stocks:
    get:
      operationId: listStocks
      tags: [Stocks]
      summary: List stocks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockResponse'
        '401':
          description: Unauthorized
    post:
      operationId: createStock
      tags: [Stocks]
      summary: Create a stock holding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
        '401':
          description: Unauthorized
  /v1/stocks/symbol/{symbol}/valuation:
    parameters:
      - name: symbol
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: getStockValuation
      tags: [Stocks]
      summary: Get the bear, base, and bull valuation ranges for a stock by symbol
      description: Returns the saved valuation for the authenticated user's stock with this symbol. Responds with 404 if the authenticated user does not own the stock or has not saved valuation data yet.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValuationRequest'
        '404':
          description: Stock or valuation not found
        '401':
          description: Unauthorized
    post:
      operationId: createStockValuation
      tags: [Stocks]
      summary: Create valuation ranges for a stock by symbol
      description: Creates a bear/base/bull valuation for the authenticated user's stock with this symbol. The stock must already exist in the authenticated user's portfolio.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockValuationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValuationRequest'
        '400':
          description: Invalid symbol, targetDate, or price range
        '404':
          description: Stock not found
        '409':
          description: Valuation already exists
        '401':
          description: Unauthorized
    put:
      operationId: updateStockValuation
      tags: [Stocks]
      summary: Update valuation ranges for a stock by symbol
      description: Updates the saved valuation for the authenticated user's stock with this symbol. Returns 404 if the authenticated user does not own the stock or has not created valuation data yet.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockValuationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValuationRequest'
        '400':
          description: Invalid symbol, targetDate, or price range
        '404':
          description: Stock or valuation not found
        '401':
          description: Unauthorized
  /v1/stocks/bulk:
    post:
      operationId: bulkCreateStocks
      tags: [Stocks]
      summary: Create multiple stock holdings
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkStockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkStockResponse'
        '401':
          description: Unauthorized
  /v1/stocks/{stockId}:
    parameters:
      - name: stockId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getStock
      tags: [Stocks]
      summary: Get a stock holding by id
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    put:
      operationId: updateStock
      tags: [Stocks]
      summary: Update a stock holding
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    delete:
      operationId: deleteStock
      tags: [Stocks]
      summary: Delete a stock holding
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '401':
          description: Unauthorized

  /v1/watchlist:
    get:
      operationId: listWatchlist
      tags: [Watchlist]
      summary: List watchlist items
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WatchlistItemResponse'
        '401':
          description: Unauthorized
    post:
      operationId: createWatchlistItem
      tags: [Watchlist]
      summary: Add or reactivate a watchlist symbol
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistItemRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItemResponse'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItemResponse'
        '401':
          description: Unauthorized
  /v1/watchlist/{watchlistId}:
    parameters:
      - name: watchlistId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: updateWatchlistItem
      tags: [Watchlist]
      summary: Update a watchlist item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WatchlistItemUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatchlistItemResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    delete:
      operationId: deleteWatchlistItem
      tags: [Watchlist]
      summary: Delete a watchlist item
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '401':
          description: Unauthorized

  /v1/research:
    get:
      operationId: listResearch
      tags: [Research]
      summary: List research notes
      security:
        - bearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ResearchNoteResponse'
        '401':
          description: Unauthorized
    post:
      operationId: createResearch
      tags: [Research]
      summary: Create a research note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchNoteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchNoteResponse'
        '401':
          description: Unauthorized
  /v1/research/{researchId}:
    parameters:
      - name: researchId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getResearch
      tags: [Research]
      summary: Get a research note by id
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchNoteResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    put:
      operationId: updateResearch
      tags: [Research]
      summary: Update a research note
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResearchNoteRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResearchNoteResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    delete:
      operationId: deleteResearch
      tags: [Research]
      summary: Delete a research note
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '401':
          description: Unauthorized

  /v1/targets:
    get:
      operationId: listTargets
      tags: [Targets]
      summary: List targets
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScenarioTargetResponse'
        '401':
          description: Unauthorized
    post:
      operationId: createTarget
      tags: [Targets]
      summary: Create a target
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioTargetRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioTargetResponse'
        '401':
          description: Unauthorized
  /v1/targets/{targetId}:
    parameters:
      - name: targetId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    put:
      operationId: updateTarget
      tags: [Targets]
      summary: Update a target
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioTargetRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioTargetResponse'
        '404':
          description: Not Found
        '401':
          description: Unauthorized
    delete:
      operationId: deleteTarget
      tags: [Targets]
      summary: Delete a target
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
        '401':
          description: Unauthorized

  /v1/news:
    get:
      operationId: listNews
      tags: [News]
      summary: List saved news items
      security:
        - bearerAuth: []
      parameters:
        - name: symbol
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsItemResponse'
        '401':
          description: Unauthorized
    post:
      operationId: createNews
      tags: [News]
      summary: Save a news item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsItemRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          description: Unauthorized
  /v1/news/feed:
    get:
      operationId: listNewsFeed
      tags: [News]
      summary: List feed news for tracked symbols
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NewsItemResponse'
        '401':
          description: Unauthorized
  /v1/news/sync:
    post:
      operationId: syncNews
      tags: [News]
      summary: Sync news items from configured provider
      description: Resolves the authenticated user's tracked symbols, fetches provider news, persists normalized articles in the backend database, updates existing rows when the provider sends revised metadata for the same article, and skips duplicates or untracked symbols. When Finnhub is the configured provider, the backend must have `FINNHUB_API_KEY` set.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sync summary after provider fetch, normalization, and persistence
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsSyncResponse'
        '401':
          description: Unauthorized
        '501':
          description: News provider not configured on the backend
  /v1/news/{newsId}:
    parameters:
      - name: newsId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getNews
      tags: [News]
      summary: Get a news item by id
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    put:
      operationId: updateNews
      tags: [News]
      summary: Update a news item
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsItemRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
    delete:
      operationId: deleteNews
      tags: [News]
      summary: Delete a news item
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '404':
          description: Not Found

  /webhooks/finnhub/news:
    post:
      operationId: finnhubNewsWebhook
      tags: [Webhooks, Finnhub, News]
      summary: Receive Finnhub news webhook events
      description: Persists inbound Finnhub news articles for users tracking matching symbols in stocks or watchlists. Authenticate with either the `X-Finnhub-Secret` header or the `secret` query parameter using `FINNHUB_WEBHOOK_SECRET`. Deploy this route at `FINNHUB_WEBHOOK_URL`.
      security:
        - finnhubWebhookSecretHeader: []
        - finnhubWebhookSecretQuery: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinnhubNewsWebhookRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
