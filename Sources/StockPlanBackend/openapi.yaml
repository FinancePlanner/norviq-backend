components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    finnhubQueryToken:
      type: apiKey
      in: query
      name: token
      description: Finnhub API key from the Finnhub Dashboard passed as the `token` query parameter. In Bruno, set `FINNHUB_API_KEY`.
    finnhubHeaderToken:
      type: apiKey
      in: header
      name: X-Finnhub-Token
      description: Finnhub API key from the Finnhub Dashboard passed as the `X-Finnhub-Token` header. In Bruno, set `FINNHUB_API_KEY`.
    fmpQueryApiKey:
      type: apiKey
      in: query
      name: apikey
      description: FMP API key passed as the `apikey` query parameter. In Bruno, set `FMP_API_KEY`.
    finnhubWebhookSecretHeader:
      type: apiKey
      in: header
      name: X-Finnhub-Secret
      description: Shared secret for inbound Finnhub webhook delivery. Configure the backend with `FINNHUB_WEBHOOK_SECRET`.
    finnhubWebhookSecretQuery:
      type: apiKey
      in: query
      name: secret
      description: Shared secret for inbound Finnhub webhook delivery when the provider can only append query parameters. Configure the backend with `FINNHUB_WEBHOOK_SECRET`.
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
      required: [status]
    AuthRegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    AuthLoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]
    AuthResponse:
      type: object
      properties:
        token:
          type: string
        userId:
          type: string
          format: uuid
        expiresIn:
          type: integer
          format: int32
        refreshToken:
          type: string
        refreshExpiresIn:
          type: integer
          format: int32
      required: [token, userId, expiresIn, refreshToken, refreshExpiresIn]
    AuthUserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
      required: [id, email]
    AuthForgotPasswordRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required: [email]
    AuthForgotPasswordResponse:
      type: object
      properties:
        message:
