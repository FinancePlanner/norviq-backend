                  series:
                    type: array
                    minItems: 1
                    maxItems: 4
                    items:
                      type: object
                      required: [runId, points]
                      properties:
                        runId: { type: string, format: uuid }
                        points:
                          type: array
                          items:
                            type: object
                            required: [elapsedDays, value, percentageChange]
                            properties:
