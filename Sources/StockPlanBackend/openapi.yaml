openapi: 3.0.3
info:
  title: StockPlanBackend
  description: Stock planner backend
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local (docker-compose)
  - url: /
    description: Relative base URL
tags:
  - name: Health
  - name: Auth
  - name: Stocks
  - name: Watchlist
  - name: Research
  - name: Targets
  - name: MarketData
  - name: Portfolio
  - name: Brokers
  - name: Statistics
  - name: News
paths:
  /:
    get:
      operationId: root
      tags: [Health]
      summary: Health check root
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /hello:
    get:
      operationId: hello
      tags: [Health]
      summary: Hello world
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /auth/register:
    post:
      operationId: authRegister
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/login:
    post:
      operationId: authLogin
      tags: [Auth]
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/forgot-password:
    post:
      operationId: authForgotPassword
      tags: [Auth]
      summary: Issue a password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
  /auth/resend-reset:
    post:
      operationId: authResendReset
      tags: [Auth]
      summary: Resend a password reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthForgotPasswordResponse'
  /auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [Auth]
      summary: Reset password using a reset code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResetPasswordRequest'
      responses:
        '204':
          description: No Content
  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [Auth]
      summary: Refresh tokens using a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /auth/me:
    get:
      operationId: authMe
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          description: Unauthorized

