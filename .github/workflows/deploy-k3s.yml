name: Deploy to k3s (staging)

# Manual, additive path for the k3s/ArgoCD migration. Does NOT touch the existing
# VPS docker-compose deploy (deploy.yml). Builds + pushes the image, then writes
# the tag into norviq-infra apps/api/values-staging.yaml so ArgoCD deploys api to
# the k3s staging namespace. Production is promoted via norviq-infra's promote
# workflow once staging is verified.

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }} # FinancePlanner/norviq-backend

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Resolve repo (lowercase)
        id: repo
        run: echo "image=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.repo.outputs.image }}:${{ github.sha }}
            ${{ steps.repo.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-staging:
    name: Bump k3s staging tag in norviq-infra
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout norviq-infra
        uses: actions/checkout@v4
        with:
          repository: FinancePlanner/norviq-infra
          token: ${{ secrets.INFRA_DEPLOY_TOKEN }} # PAT with contents:write on norviq-infra
          ref: main
      - name: Install yq
        run: sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 && sudo chmod +x /usr/local/bin/yq
      - name: Write staging image tag
        run: yq -i ".image.tag = \"${{ needs.build.outputs.sha_tag }}\"" apps/api/values-staging.yaml
      - name: Commit and push
        run: |
          git config user.name "norviq-backend-ci"
          git config user.email "ci@norviq.org"
          if git diff --quiet; then echo "no tag change"; exit 0; fi
          git add apps/api/values-staging.yaml
          git commit -m "chore(api): bump k3s staging image to ${{ needs.build.outputs.sha_tag }}"
          git push origin main
