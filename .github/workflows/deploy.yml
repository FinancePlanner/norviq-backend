name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      app_image: ${{ steps.refs.outputs.app_image }}
      image_repository: ${{ steps.refs.outputs.image_repository }}
      image_sha_tag: ${{ steps.refs.outputs.image_sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image references
        id: refs
        run: |
          IMAGE_REPOSITORY="${REGISTRY}/${IMAGE_NAME,,}"
          IMAGE_SHA_TAG="${GITHUB_SHA}"
          APP_IMAGE="${IMAGE_REPOSITORY}:${IMAGE_SHA_TAG}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_sha_tag=${IMAGE_SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_image=${APP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REPOSITORY=${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA_TAG=${IMAGE_SHA_TAG}" >> "$GITHUB_ENV"
          echo "APP_IMAGE=${APP_IMAGE}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_SHA_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validate SSH secrets
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "SERVER_HOST is empty" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "SERVER_USER is empty" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "SERVER_SSH_KEY is empty" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject webhook URLs into Grafana provisioning
        run: |
          sed -i 's|SLACK_WEBHOOK_PLACEHOLDER|${{ secrets.GRAFANA_SLACK_WEBHOOK_URL }}|' \
            monitoring/grafana/provisioning/alerting/contact-points.yaml
          sed -i 's|DISCORD_WEBHOOK_PLACEHOLDER|${{ secrets.GRAFANA_DISCORD_WEBHOOK_URL }}|' \
            monitoring/grafana/provisioning/alerting/contact-points.yaml

      - name: Copy monitoring config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: monitoring/otel-collector.yaml,monitoring/prometheus.yml,monitoring/grafana/provisioning
          target: /opt/stockplan/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/stockplan

            # Ensure clean working tree before updating
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            APP_IMAGE="${{ needs.build.outputs.app_image }}"

            # Login to container registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull immutable image built in CI
            docker pull "${APP_IMAGE}"

            # Persist currently deployed image reference
            if grep -q '^APP_IMAGE=' .env.production; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE}|" .env.production
            else
              echo "APP_IMAGE=${APP_IMAGE}" >> .env.production
            fi

            # No symlink — compose env_file resolves via ENV_FILE substitution
            # (defaults to .env.production). Dev deploys override ENV_FILE.

            export APP_IMAGE
            export APP_PORT=8080

            # Advanced reporting is production-critical. Validate its runtime
            # configuration before changing any containers.
            for REQUIRED_VAR in \
              REPORT_DOWNLOAD_SIGNING_SECRET \
              PUBLIC_API_BASE_URL \
              GOTENBERG_BASE_URL \
              ADVANCED_REPORT_STORAGE_PATH; do
              if ! grep -Eq "^${REQUIRED_VAR}=.+$" .env.production; then
                echo "${REQUIRED_VAR} is missing from .env.production"
                exit 1
              fi
            done
            REPORT_SIGNING_SECRET="$(grep '^REPORT_DOWNLOAD_SIGNING_SECRET=' .env.production | tail -1 | cut -d= -f2-)"
            if [ "${#REPORT_SIGNING_SECRET}" -lt 32 ]; then
              echo "REPORT_DOWNLOAD_SIGNING_SECRET must contain at least 32 characters"
              exit 1
            fi

            # Start the internal PDF renderer and prepare retained storage for
            # the API's unprivileged vapor user.
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d gotenberg
            GOTENBERG_HEALTHY=0
            for ATTEMPT in $(seq 1 30); do
              if APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
                -f docker-compose.production.yml \
                --env-file .env.production \
                exec -T gotenberg curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; then
                GOTENBERG_HEALTHY=1
                break
              fi
              sleep 2
            done
            if [ "${GOTENBERG_HEALTHY}" -ne 1 ]; then
              APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
                -f docker-compose.production.yml \
                --env-file .env.production \
                logs --tail=120 gotenberg
              exit 1
            fi
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              run --rm report-storage-init

            # Run migrations
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              run --rm migrate

            # Deploy app
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d --no-deps app

            # MCP is owned by the norviq-mcp deployment workflow. Bootstrap it
            # here only when an explicit image is provisioned for this host;
            # the backend repository token cannot read the private MCP package.
            MCP_ENABLED=0
            if grep -Eq '^MCP_INTROSPECTION_SECRET=.+$' .env.production && \
              grep -Eq '^MCP_IMAGE=.+$' .env.production; then
              MCP_IMAGE="$(sed -n 's/^MCP_IMAGE=//p' .env.production | tail -1)"
              docker pull "${MCP_IMAGE}"
              MCP_IMAGE="${MCP_IMAGE}" docker compose -p prod \
                -f docker-compose.production.yml \
                --env-file .env.production \
                up -d --no-deps mcp
              MCP_ENABLED=1
            elif ! grep -Eq '^MCP_INTROSPECTION_SECRET=.+$' .env.production; then
              echo "MCP rollout skipped: MCP_INTROSPECTION_SECRET is not provisioned"
            else
              echo "MCP rollout skipped: MCP_IMAGE is not provisioned; norviq-mcp owns deployment"
            fi

            # Ensure observability stack is running (idempotent)
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              -f docker-compose.observability.yml \
              --env-file .env.production \
              up -d otel-collector jaeger prometheus grafana

            # Health check
            HEALTHY=0
            for ATTEMPT in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:8080/health/ready >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              sleep 2
            done

            if [ "${HEALTHY}" -ne 1 ]; then
              echo "Health check failed for ${APP_IMAGE}"
              APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
                -f docker-compose.production.yml logs --tail=120 app
              exit 1
            fi

            if [ "${MCP_ENABLED}" -eq 1 ]; then
              MCP_DOMAIN="$(sed -n 's/^MCP_DOMAIN=//p' .env.production | tail -1)"
              MCP_DOMAIN="${MCP_DOMAIN:-mcp.norviq.org}"
              MCP_HEALTHY=0
              for ATTEMPT in $(seq 1 30); do
                if curl -fsS "https://${MCP_DOMAIN}/readyz" >/dev/null 2>&1; then
                  MCP_HEALTHY=1
                  break
                fi
                sleep 2
              done
              if [ "${MCP_HEALTHY}" -ne 1 ]; then
                docker compose -p prod -f docker-compose.production.yml \
                  --env-file .env.production logs --tail=120 mcp
                exit 1
              fi
            fi

            echo "Rollback command:"
            echo "APP_PORT=8080 APP_IMAGE=<previous_sha_image> docker compose -p prod -f docker-compose.production.yml --env-file .env.production up -d --no-deps app"

            # Cleanup old images older than 7 days
            docker image prune -af --filter "until=168h"
