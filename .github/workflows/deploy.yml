name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_strategy:
        description: "Container build path"
        type: choice
        required: false
        default: plugin
        options:
          - plugin
          - dockerfile

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      app_image: ${{ steps.refs.outputs.app_image }}
      image_repository: ${{ steps.refs.outputs.image_repository }}
      image_sha_tag: ${{ steps.refs.outputs.image_sha_tag }}
    env:
      BUILD_STRATEGY: ${{ github.event.inputs.build_strategy != '' && github.event.inputs.build_strategy || 'plugin' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image references
        id: refs
        run: |
          IMAGE_REPOSITORY="${REGISTRY}/${IMAGE_NAME}"
          IMAGE_SHA_TAG="${GITHUB_SHA}"
          APP_IMAGE="${IMAGE_REPOSITORY}:${IMAGE_SHA_TAG}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_sha_tag=${IMAGE_SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_image=${APP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REPOSITORY=${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA_TAG=${IMAGE_SHA_TAG}" >> "$GITHUB_ENV"
          echo "APP_IMAGE=${APP_IMAGE}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx (rollback build path)
        if: env.BUILD_STRATEGY == 'dockerfile'
        uses: docker/setup-buildx-action@v3

      - name: Build and push (Dockerfile fallback)
        if: env.BUILD_STRATEGY == 'dockerfile'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_SHA_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Swift toolchain
        if: env.BUILD_STRATEGY == 'plugin'
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.0"

      - name: Install Static Linux SDK (x86_64 musl)
        if: env.BUILD_STRATEGY == 'plugin'
        run: |
          swift sdk install \
            https://download.swift.org/swift-6.0-release/static-sdk/swift-6.0-RELEASE/swift-6.0-RELEASE_static-linux-0.1.0.artifactbundle.tar.gz \
            --checksum d2078b69bdeb5c31202c10e9d8a11d6f66f82938b51a4b75f032ccb35c4c286c

      - name: Build and push (Swift Container Plugin)
        if: env.BUILD_STRATEGY == 'plugin'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          RESOURCE_ARGS=()
          if [ -d Public ]; then
            RESOURCE_ARGS+=(--resources Public)
          fi
          if [ -d Resources ]; then
            RESOURCE_ARGS+=(--resources Resources)
          fi

          swift package \
            --allow-network-connections all \
            --allow-writing-to-package-directory \
            --swift-sdk x86_64-swift-linux-musl \
            build-container-image \
            --product StockPlanBackend \
            --repository "${IMAGE_REPOSITORY}" \
            --tag "${IMAGE_SHA_TAG}" \
            --disable-netrc \
            --default-username "${GITHUB_ACTOR}" \
            --default-password "${GITHUB_TOKEN}" \
            "${RESOURCE_ARGS[@]}" \
            --cmd serve --env production --hostname 0.0.0.0 --port 8080

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/stockplan

            # Pull latest code (for docker-compose changes)
            git pull origin main

            APP_IMAGE="${{ needs.build.outputs.app_image }}"

            # Login to container registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull immutable image built in CI
            docker pull "${APP_IMAGE}"

            # Persist currently deployed image reference
            if grep -q '^APP_IMAGE=' .env.production; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE}|" .env.production
            else
              echo "APP_IMAGE=${APP_IMAGE}" >> .env.production
            fi

            ln -sf /opt/stockplan/.env.production /opt/stockplan/.env

            export APP_IMAGE
            export APP_PORT=8080

            # Run migrations
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              run --rm migrate

            # Deploy
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d --no-deps app

            # Health check
            HEALTHY=0
            for ATTEMPT in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/health/ready >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              sleep 2
            done

            if [ "${HEALTHY}" -ne 1 ]; then
              echo "Health check failed for ${APP_IMAGE}"
              APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
                -f docker-compose.production.yml logs --tail=120 app
              exit 1
            fi

            echo "Rollback command:"
            echo "APP_PORT=8080 APP_IMAGE=<previous_sha_image> docker compose -p prod -f docker-compose.production.yml --env-file .env.production up -d --no-deps app"

            # Cleanup old images older than 7 days
            docker image prune -af --filter "until=168h"
