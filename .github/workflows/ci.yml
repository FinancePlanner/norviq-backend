name: CI

on:
  push:
    branches-ignore:
      - main
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
  pull_request:
    branches:
      - main
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'

jobs:
  lint:
    name: SwiftFormat Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: SwiftFormat
        run: swiftformat --lint . --reporter github-actions-log

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: stockplan_user
          POSTGRES_PASSWORD: stockplan_password
          POSTGRES_DB: stockplan_test
        options: >-
          --health-cmd "pg_isready -U stockplan_user -d stockplan_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    container:
      image: swift:6.3.1-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-test-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-test-

      - name: Run tests
        env:
          DATABASE_HOST: postgres
          DATABASE_PORT: 5432
          DATABASE_NAME: stockplan_test
          DATABASE_USERNAME: stockplan_user
          DATABASE_PASSWORD: stockplan_password
          REDIS_URL: redis://redis:6379
          LOG_LEVEL: error
        run: swift test
