# Docker Compose for Production Deployment
#
# Usage:
#   1. Copy .env.example to .env and set production values
#   2. Set APP_IMAGE to an immutable registry tag:
#      export APP_IMAGE=ghcr.io/<owner>/<repo>:<git-sha>
#   3. Start DB: docker compose -f docker-compose.production.yml up -d db
#   4. Migrate:  docker compose -f docker-compose.production.yml run --rm migrate
#   5. Deploy:   docker compose -f docker-compose.production.yml up -d app
#

volumes:
  db_data:
  redis_data:
  traefik_certificates:

networks:
  internal:
  external:

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certificates:/letsencrypt
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    networks:
      - external

  # Vapor application
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file: .env
    environment:
      DATABASE_HOST: db
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    networks:
      - internal
      - external
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN:?DOMAIN is required}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=8080"

  # PostgreSQL database
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:-stockplan_prod}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal

  # Migration runner (run manually with: docker compose run --rm migrate)
  migrate:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file: .env
    environment:
      DATABASE_HOST: db
    command: ["migrate", "--yes"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    profiles:
      - tools