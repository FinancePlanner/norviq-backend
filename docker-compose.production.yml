# Docker Compose for Production Deployment
#
# Usage:
#   1. Copy .env.example to .env and set production values
#   2. Set APP_IMAGE to an immutable registry tag:
#      export APP_IMAGE=ghcr.io/<owner>/<repo>:<git-sha>
#   3. Start DB: docker compose -f docker-compose.production.yml up -d db
#   4. Migrate:  docker compose -f docker-compose.production.yml run --rm migrate
#   5. Deploy:   docker compose -f docker-compose.production.yml up -d app
#

volumes:
  db_data:
  redis_data:

networks:
  internal:
  external:

services:
  # Vapor application
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file: .env
    environment:
      DATABASE_HOST: db
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - internal
      - external
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # PostgreSQL database
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:-stockplan_prod}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:?DATABASE_USERNAME is required} -d ${DATABASE_NAME:-stockplan_prod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal

  # Migration runner (run manually with: docker compose run --rm migrate)
  migrate:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file: .env
    environment:
      DATABASE_HOST: db
    command: ["migrate", "--yes"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    profiles:
      - tools
