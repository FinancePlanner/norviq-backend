# Docker Compose for Production Deployment
#
# Usage:
#   1. Copy .env.example to .env and set production values
#   2. Set APP_IMAGE to an immutable registry tag:
#      export APP_IMAGE=ghcr.io/<owner>/<repo>:<git-sha>
#   3. Start DB: docker compose -f docker-compose.production.yml up -d db
#   4. Migrate:  docker compose -f docker-compose.production.yml run --rm migrate
#   5. Deploy:   docker compose -f docker-compose.production.yml up -d app
#

volumes:
  db_data:
  redis_data:
  traefik_certificates:
  advanced_report_data:

networks:
  internal:
  external:

services:
  # Traefik Reverse Proxy
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certificates:/letsencrypt
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ACME_EMAIL is required}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    networks:
      - external

  # Vapor application
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_HOST: db
      SCENARIO_PLANNING_ENABLED: "true"
      SCENARIO_HISTORY_REFRESH_SECONDS: "86400"
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:8080"
    volumes:
      - advanced_report_data:/var/lib/norviq/advanced-reports
    networks:
      - internal
      - external
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      gotenberg:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`${DOMAIN:?DOMAIN is required}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.services.app.loadbalancer.server.port=8080"

  # Internal-only HTML-to-PDF renderer for the Advanced Reporting Center.
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.23.2
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  # Named volumes are root-owned on first creation. Initialize permissions for
  # the unprivileged vapor user before starting a newly deployed API image.
  report-storage-init:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R vapor:vapor /var/lib/norviq/advanced-reports"]
    volumes:
      - advanced_report_data:/var/lib/norviq/advanced-reports
    profiles:
      - tools

  # PostgreSQL database
  mcp:
    image: ${MCP_IMAGE:-ghcr.io/financeplanner/norviq-mcp:350d030459277a9dbd5a71549fe01aadc3feb684}
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      BACKEND_BASE_URL: http://app:8080
      MCP_PUBLIC_URL: https://${MCP_DOMAIN:-mcp.norviq.org}
      LISTEN_ADDR: :8087
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    networks:
      - internal
      - external
    labels:
      - traefik.enable=true
      - traefik.http.routers.norviq-mcp.rule=Host(`${MCP_DOMAIN:-mcp.norviq.org}`)
      - traefik.http.routers.norviq-mcp.entrypoints=websecure
      - traefik.http.routers.norviq-mcp.tls.certresolver=letsencrypt
      - traefik.http.services.norviq-mcp.loadbalancer.server.port=8087

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:?DATABASE_USERNAME is required}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      POSTGRES_DB: ${DATABASE_NAME:-stockplan_prod}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal

  # Migration runner (run manually with: docker compose run --rm migrate)
  migrate:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    env_file: ${ENV_FILE:-.env.production}
    environment:
      DATABASE_HOST: db
    command: ["migrate", "--yes"]
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    profiles:
      - tools
