# Docker Compose for faster Swift development
#
# Usage:
#   docker compose -f docker-compose.dev.yml up --build app
#

volumes:
  db_data:
  redis_data:
  # Persistent volume for Swift build artifacts between runs
  # This makes subsequent 'up' commands much faster
  swift_build_cache:

x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DATABASE_HOST: db
  DATABASE_PORT: ${DATABASE_PORT:-5432}
  DATABASE_NAME: stockplan_dev
  DATABASE_USERNAME: stockplan_user
  DATABASE_PASSWORD: stockplan_password
  REDIS_URL: redis://redis:6379
  # Auth
  JWT_SECRET: ${JWT_SECRET:-change-me-dev}
  JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-604800}
  JWT_REFRESH_EXPIRES_IN_SECONDS: ${JWT_REFRESH_EXPIRES_IN_SECONDS:-2592000}
  AUTH_RESET_RETURN_CODE: ${AUTH_RESET_RETURN_CODE:-true}
  AUTH_TOKEN_CLEANUP_INTERVAL_MINUTES: ${AUTH_TOKEN_CLEANUP_INTERVAL_MINUTES:-60}
  # Market data
  MARKET_PROVIDER: ${MARKET_PROVIDER:-}
  STOCK_API_KEY: ${STOCK_API_KEY:-}
  FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
  FINNHUB_WEBHOOK_URL: ${FINNHUB_WEBHOOK_URL:-}
  FINNHUB_WEBHOOK_SECRET: ${FINNHUB_WEBHOOK_SECRET:-}
  FMP_API_KEY: ${FMP_API_KEY:-}
  # IBKR
  IBKR_API_BASE_URL: ${IBKR_API_BASE_URL:-}
  IBKR_USERNAME: ${IBKR_USERNAME:-}
  IBKR_PASSWORD: ${IBKR_PASSWORD:-}
  IBKR_MODE: ${IBKR_MODE:-paper}
  IBKR_VNC_PASSWORD: ${IBKR_VNC_PASSWORD:-}
  IBKR_GATEWAY_HOST: ${IBKR_GATEWAY_HOST:-ib-gateway}
  IBKR_GATEWAY_PORT: ${IBKR_GATEWAY_PORT:-5000}
  # APNS
  APNS_TEAM_ID: ${APNS_TEAM_ID:-}
  APNS_KEY_ID: ${APNS_KEY_ID:-}
  APNS_PRIVATE_KEY_P8: ${APNS_PRIVATE_KEY_P8:-}
  APNS_TOPIC: ${APNS_TOPIC:-}
  # OAuth
  OAUTH_APPLE_CLIENT_ID: ${OAUTH_APPLE_CLIENT_ID:-}
  OAUTH_APPLE_TEAM_ID: ${OAUTH_APPLE_TEAM_ID:-}
  OAUTH_APPLE_KEY_ID: ${OAUTH_APPLE_KEY_ID:-}
  OAUTH_APPLE_PRIVATE_KEY: ${OAUTH_APPLE_PRIVATE_KEY:-}
  OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
  OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
  OAUTH_X_CLIENT_ID: ${OAUTH_X_CLIENT_ID:-}
  OAUTH_X_CLIENT_SECRET: ${OAUTH_X_CLIENT_SECRET:-}
  OAUTH_X_SCOPES: ${OAUTH_X_SCOPES:-}
  OAUTH_ALLOWED_REDIRECT_URIS: ${OAUTH_ALLOWED_REDIRECT_URIS:-}
  # Billing
  BYPASS_BILLING: ${BYPASS_BILLING:-true}
  BILLING_PREMIUM_EMAILS: ${BILLING_PREMIUM_EMAILS:-}
  REVENUECAT_API_KEY: ${REVENUECAT_API_KEY:-}
  REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
  # Enable faster debug configuration
  SWIFT_BUILD_CONFIGURATION: debug

services:
  app:
    image: stockplanbackend:debug
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      <<: *shared_environment
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8080:8080"
      - "[::1]:8080:8080"
    volumes:
      # Mount current directory to /workspace for hot-reloading
      - .:/workspace
      # Map the build cache volume separately so it's not overriden by the local .build mount
      - swift_build_cache:/workspace/.build
    # Hot-reloading via inotifywait in Docker
    command: ["bash", "scripts/dev-watch.sh"]

  db:
    image: postgres:18-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: stockplan_user
      POSTGRES_PASSWORD: stockplan_password
      POSTGRES_DB: stockplan_dev
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
