apiVersion: 1

# Note: Grafana provisioning does not expand shell env vars.
# Set the webhook URL directly here, or manage this file outside of git
# and inject it at deploy time.

contactPoints:
  - orgId: 1
    name: stockplan-slack
    receivers:
      - uid: stockplan-slack
        type: slack
        disableResolveMessage: false
        settings:
          url: ${GRAFANA_SLACK_WEBHOOK_URL}
          recipient: "#alerts"
          mentionChannel: here

policies:
  - orgId: 1
    receiver: grafana-default-email
