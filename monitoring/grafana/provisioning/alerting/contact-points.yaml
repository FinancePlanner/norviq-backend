apiVersion: 1

contactPoints:
  - orgId: 1
    name: stockplan-email
    receivers:
      - uid: stockplan-email
        type: email
        settings:
          addresses: ${GRAFANA_ALERT_EMAIL_TO}
          singleEmail: false
  - orgId: 1
    name: stockplan-slack
    receivers:
      - uid: stockplan-slack
        type: slack
        settings:
          url: ${GRAFANA_SLACK_WEBHOOK_URL}
          recipient: "#alerts"
          mentionChannel: here

policies:
  - orgId: 1
    receiver: stockplan-email
    group_by:
      - grafana_folder
      - alertname
    routes:
      - receiver: stockplan-slack
        object_matchers:
          - ["severity", "=", "critical"]
