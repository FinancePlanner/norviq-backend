global:
  scrape_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:9464"]

  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: norviq-mcp
    metrics_path: /metrics
    static_configs:
      - targets: ["mcp:8087"]
