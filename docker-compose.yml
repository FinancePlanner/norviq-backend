# Docker Compose file for Vapor
#
# Install Docker on your system to run and test
# your Vapor app in a production-like environment.
#
# Note: This file is intended for testing and does not
# implement best practices for a production deployment.
#
# Learn more: https://docs.docker.com/compose/reference/
#
#   Build images: docker compose build
#      Start app: docker compose up app
# Start database: docker compose up db
# Run migrations: docker compose run migrate
#       Stop all: docker compose down (add -v to wipe db)
#

volumes:
  db_data:
  redis_data:

x-shared_environment: &shared_environment
  LOG_LEVEL: ${LOG_LEVEL:-debug}
  DATABASE_HOST: db
  DATABASE_NAME: &db_name stockplan_dev
  DATABASE_USERNAME: &db_username stockplan_user
  DATABASE_PASSWORD: &db_password stockplan_password
  REDIS_URL: redis://redis:6379
  MARKET_PROVIDER: ${MARKET_PROVIDER:-}
  IBKR_API_BASE_URL: ${IBKR_API_BASE_URL:-}
  IBKR_CONNECT_MODE: ${IBKR_CONNECT_MODE:-gateway}
  IBKR_OAUTH_CLIENT_ID: ${IBKR_OAUTH_CLIENT_ID:-}
  IBKR_OAUTH_KEY_ID: ${IBKR_OAUTH_KEY_ID:-}
  IBKR_OAUTH_PRIVATE_KEY_PEM: ${IBKR_OAUTH_PRIVATE_KEY_PEM:-}
  IBKR_OAUTH_AUTHORIZATION_URL: ${IBKR_OAUTH_AUTHORIZATION_URL:-}
  IBKR_OAUTH_TOKEN_URL: ${IBKR_OAUTH_TOKEN_URL:-}
  IBKR_OAUTH_API_BASE_URL: ${IBKR_OAUTH_API_BASE_URL:-}
  IBKR_OAUTH_SCOPE: ${IBKR_OAUTH_SCOPE:-}
  FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
  FINNHUB_WEBHOOK_URL: ${FINNHUB_WEBHOOK_URL:-}
  FINNHUB_WEBHOOK_SECRET: ${FINNHUB_WEBHOOK_SECRET:-}
  FMP_API_KEY: ${FMP_API_KEY:-}
  REVENUECAT_API_KEY: ${REVENUECAT_API_KEY:-}
  REVENUECAT_PROJECT_ID: ${REVENUECAT_PROJECT_ID:-}
  REVENUECAT_API_V2_KEY: ${REVENUECAT_API_V2_KEY:-}
  REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
  REVENUECAT_HMAC_SECRET: ${REVENUECAT_HMAC_SECRET:-}
  DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
  HERMES_BASE_URL: ${HERMES_BASE_URL:-}
  HERMES_API_TOKEN: ${HERMES_API_TOKEN:-}
  HERMES_SYNC_INTERVAL_SECONDS: ${HERMES_SYNC_INTERVAL_SECONDS:-900}
  HERMES_TRACKED_TICKERS: ${HERMES_TRACKED_TICKERS:-}
  INSIGHTS_ADMIN_EMAILS: ${INSIGHTS_ADMIN_EMAILS:-}

services:
  app:
    image: stockplanbackend:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    depends_on:
      - db
      - redis
      - ib-gateway
    ports:
      - "8080:8080"
    # user: '0' # uncomment to run as root for testing purposes even though Dockerfile defines 'vapor' user.
    command:
      [
        "serve",
        "--env",
        "production",
        "--hostname",
        "0.0.0.0",
        "--port",
        "8080",
      ]
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    environment:
      TWS_USERID: ${IBKR_USERNAME:-}
      TWS_PASSWORD: ${IBKR_PASSWORD:-}
      TRADING_MODE: ${IBKR_MODE:-paper}
      READ_ONLY_API: "yes"
      VNC_SERVER_PASSWORD: ${IBKR_VNC_PASSWORD:-}
      TWOFA_TIMEOUT_ACTION: restart
      AUTO_RESTART_TIME: "11:59 PM"
      TIME_ZONE: ${TZ:-Etc/UTC}
    ports:
      - "127.0.0.1:4001:4003"
      - "127.0.0.1:4002:4004"
      - "127.0.0.1:5900:5900"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/v1/api/iserver/auth/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
  migrate:
    image: stockplanbackend:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    depends_on:
      - db
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0
  revert:
    image: stockplanbackend:latest
    build:
      context: .
    environment:
      <<: *shared_environment
    depends_on:
      - db
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0
  db:
    image: postgres:18-alpine
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: *db_username
      POSTGRES_PASSWORD: *db_password
      POSTGRES_DB: *db_name
    ports:
      - "5432:5432"
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
